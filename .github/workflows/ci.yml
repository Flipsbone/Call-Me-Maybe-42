name: CI Call Me Maybe

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.10
        run: uv python install 3.10
        
      - name: Install dependencies
        run: uv sync --all-extras
        
      - name: Run Flake8
        run: uv run flake8 src/
        
      - name: Run Mypy
        run: uv run mypy --warn-unused-ignores --ignore-missing-imports --disallow-untyped-defs --check-untyped-defs --warn-return-any src/
